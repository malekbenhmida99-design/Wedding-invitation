<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Envelope</title>
    <link rel="stylesheet" href="envelope-styles.css">
</head>
<body>
    <div class="envelope-page">
        <div class="envelope-container">
            <div class="envelope">
                <!-- Envelope Back -->
                <div class="envelope-back"></div>
                
                <!-- Envelope Front -->
                <div class="envelope-front">
                    <div class="envelope-flap"></div>
                    <div class="envelope-body">
                        <div class="envelope-text" id="envelope-text">
                            <h1>Wedding Invitation</h1>
                            <p>Malek & Rihem</p>
                        </div>
                        
                        <!-- Stamp -->
                        <div class="stamp" onclick="openInvitation()">
                            <div class="stamp-content" id="stamp-text">
                                <p>CLICK</p>
                                <p>TO OPEN</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="envelope-script.js"></script>
</body>
</html>
