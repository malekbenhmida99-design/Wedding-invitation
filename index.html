<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Language Selection</title>
    <link rel="stylesheet" href="language-selector.css">
</head>
<body>
    <div class="language-selector-container">
        <div class="selector-card">
            <h1>Select Language</h1>
            <p>Choose your preferred language</p>
            
            <div class="language-buttons">
                <button class="lang-btn english" onclick="selectLanguage('english')">
                    <span class="flag">🇬🇧</span>
                    <span class="lang-name">English</span>
                </button>
                
                <button class="lang-btn arabic" onclick="selectLanguage('arabic')">
                    <span class="flag">🇸🇦</span>
                    <span class="lang-name">العربية</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        function selectLanguage(lang) {
            localStorage.setItem('selectedLanguage', lang);
            window.location.href = 'invitation.html';
        }
    </script>
</body>
</html>
