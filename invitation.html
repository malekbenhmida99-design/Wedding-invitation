<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malek & Rihem Wedding Invitation</title>
    <link rel="stylesheet" href="invitation-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="envelope-section" class="envelope-section active">
        <div class="envelope-stage">
            <div class="envelope-language-bar">
                <div class="language-toggle" aria-label="Language switcher">
                    <button type="button" id="english-toggle-envelope" class="lang-toggle-btn active" onclick="setLanguage('english')">English</button>
                    <button type="button" id="arabic-toggle-envelope" class="lang-toggle-btn" onclick="setLanguage('arabic')">العربية</button>
                </div>
            </div>

            <div class="envelope-container">
                <div class="envelope">
                    <div class="envelope-back"></div>
                    <div class="envelope-front">
                        <div class="envelope-flap"></div>
                        <div class="envelope-body">
                            <div class="envelope-text" id="envelope-text">
                                <h1>Wedding Invitation</h1>
                                <p class="envelope-couple-names">MALEK &amp; RIHEM</p>
                            </div>
                            <button class="seal-stamp" type="button" onclick="openInvitation()" aria-label="Open invitation">
                                <span class="seal-inner">
                                    <span class="seal-monogram">M &amp; R</span>
                                </span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="invitation-section" class="invitation-section">
        <div class="invitation-header">
            <div class="top-controls">
                <button class="back-btn" onclick="backToEnvelope()">← Back</button>
                <div class="language-toggle" aria-label="Language switcher">
                    <button type="button" id="english-toggle" class="lang-toggle-btn active" onclick="setLanguage('english')">English</button>
                    <button type="button" id="arabic-toggle" class="lang-toggle-btn" onclick="setLanguage('arabic')">العربية</button>
                </div>
            </div>
        </div>

        <div id="english-content" class="language-content active">
            <div class="invitation-container">
                <div class="invitation-card">
                    <div class="decorative-corner top-left"></div>
                    <div class="decorative-corner top-right"></div>
                    <div class="content">
                        <div class="header-text">
                            <p class="cordial">YOU ARE CORDIALLY INVITED TO</p>
                            <p class="ceremony">THE WEDDING OF</p>
                        </div>
                        <div class="names-section">
                            <div class="divider"></div>
                            <h1 class="couple-names">Malek &amp; Rihem</h1>
                            <div class="divider"></div>
                        </div>
                        <div class="date-section">
                            <div class="date-info">
                                <p class="date-day">MONDAY</p>
                                <p class="date-number">17</p>
                                <p class="date-month">AUGUST</p>
                                <p class="date-year">2026</p>
                                <p class="date-time">9 PM</p>
                            </div>
                        </div>
                        <div class="location-section">
                            <p class="venue">Haifa Palace Morneg</p>
                            <a href="https://maps.app.goo.gl/m9n8pzfaNcvFnZn8A" target="_blank" class="map-link">📍 View Location</a>
                        </div>
                        <div class="rings-section" aria-hidden="true">
                            <svg class="rings-icon" viewBox="0 0 220 120" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="82" cy="66" r="32" fill="none" stroke="#c6a27a" stroke-width="8"/>
                                <circle cx="138" cy="54" r="32" fill="none" stroke="#d8b892" stroke-width="8"/>
                                <path d="M138 22 L146 8 L154 22" fill="none" stroke="#d8b892" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
                                <circle cx="150" cy="8" r="5" fill="#f3e8dc" stroke="#d8b892" stroke-width="2"/>
                            </svg>
                        </div>
                    </div>
                    <div class="floral-bottom">
                        <div class="flower-group left">
                            <svg class="flower-large" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="45" fill="#d4a5a5" opacity="0.6"/><circle cx="85" cy="85" r="30" fill="#e8b8b8" opacity="0.7"/><circle cx="115" cy="85" r="30" fill="#d4a5a5" opacity="0.8"/><circle cx="100" cy="60" r="25" fill="#e8c8c8" opacity="0.7"/><circle cx="100" cy="130" r="28" fill="#d9a5a5" opacity="0.6"/></svg>
                            <svg class="flower-small" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg"><circle cx="75" cy="75" r="35" fill="#a8d4e0" opacity="0.5"/><circle cx="65" cy="65" r="22" fill="#b8d4e0" opacity="0.6"/><circle cx="85" cy="65" r="22" fill="#98c4d0" opacity="0.7"/><circle cx="75" cy="50" r="20" fill="#a8d4e0" opacity="0.8"/></svg>
                            <svg class="leaves" viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg"><ellipse cx="30" cy="40" rx="12" ry="30" fill="#9fb3cc" opacity="0.5" transform="rotate(-30 30 40)"/><ellipse cx="50" cy="60" rx="10" ry="28" fill="#a8c4d0" opacity="0.5" transform="rotate(20 50 60)"/><ellipse cx="20" cy="100" rx="11" ry="32" fill="#8fa3c4" opacity="0.4" transform="rotate(-40 20 100)"/></svg>
                        </div>
                        <div class="flower-group right">
                            <svg class="flower-large" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="45" fill="#d4a5a5" opacity="0.6"/><circle cx="85" cy="85" r="30" fill="#e8b8b8" opacity="0.7"/><circle cx="115" cy="85" r="30" fill="#d4a5a5" opacity="0.8"/><circle cx="100" cy="60" r="25" fill="#e8c8c8" opacity="0.7"/><circle cx="100" cy="130" r="28" fill="#d9a5a5" opacity="0.6"/></svg>
                            <svg class="flower-small" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg"><circle cx="75" cy="75" r="35" fill="#a8d4e0" opacity="0.5"/><circle cx="65" cy="65" r="22" fill="#b8d4e0" opacity="0.6"/><circle cx="85" cy="65" r="22" fill="#98c4d0" opacity="0.7"/><circle cx="75" cy="50" r="20" fill="#a8d4e0" opacity="0.8"/></svg>
                            <svg class="leaves" viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg"><ellipse cx="70" cy="40" rx="12" ry="30" fill="#9fb3cc" opacity="0.5" transform="rotate(30 70 40)"/><ellipse cx="50" cy="60" rx="10" ry="28" fill="#a8c4d0" opacity="0.5" transform="rotate(-20 50 60)"/><ellipse cx="80" cy="100" rx="11" ry="32" fill="#8fa3c4" opacity="0.4" transform="rotate(40 80 100)"/></svg>
                        </div>
                    </div>
                    <div class="decorative-corner bottom-left"></div>
                    <div class="decorative-corner bottom-right"></div>
                </div>
            </div>
        </div>

        <div id="arabic-content" class="language-content">
            <div class="invitation-container">
                <div class="invitation-card" dir="rtl">
                    <div class="decorative-corner top-left"></div>
                    <div class="decorative-corner top-right"></div>
                    <div class="content">
                        <div class="header-text">
                            <p class="cordial">يشرفنا دعوتك لحضور</p>
                            <p class="ceremony">حفل زفاف</p>
                        </div>
                        <div class="names-section">
                            <div class="divider"></div>
                            <h1 class="couple-names">مالك و ريهام</h1>
                            <div class="divider"></div>
                        </div>
                        <div class="date-section">
                            <div class="date-info">
                                <p class="date-day">الاثنين</p>
                                <p class="date-number">17</p>
                                <p class="date-month">أوت</p>
                                <p class="date-year">2026</p>
                                <p class="date-time">التاسعة مساءا</p>
                            </div>
                        </div>
                        <div class="location-section">
                            <p class="venue">قصر هيفاء بمرناق</p>
                            <a href="https://maps.app.goo.gl/m9n8pzfaNcvFnZn8A" target="_blank" class="map-link">📍 عرض الموقع</a>
                        </div>
                        <div class="rings-section" aria-hidden="true">
                            <svg class="rings-icon" viewBox="0 0 220 120" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="82" cy="66" r="32" fill="none" stroke="#c6a27a" stroke-width="8"/>
                                <circle cx="138" cy="54" r="32" fill="none" stroke="#d8b892" stroke-width="8"/>
                                <path d="M138 22 L146 8 L154 22" fill="none" stroke="#d8b892" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
                                <circle cx="150" cy="8" r="5" fill="#f3e8dc" stroke="#d8b892" stroke-width="2"/>
                            </svg>
                        </div>
                    </div>
                    <div class="floral-bottom">
                        <div class="flower-group left">
                            <svg class="flower-large" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="45" fill="#d4a5a5" opacity="0.6"/><circle cx="85" cy="85" r="30" fill="#e8b8b8" opacity="0.7"/><circle cx="115" cy="85" r="30" fill="#d4a5a5" opacity="0.8"/><circle cx="100" cy="60" r="25" fill="#e8c8c8" opacity="0.7"/><circle cx="100" cy="130" r="28" fill="#d9a5a5" opacity="0.6"/></svg>
                            <svg class="flower-small" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg"><circle cx="75" cy="75" r="35" fill="#a8d4e0" opacity="0.5"/><circle cx="65" cy="65" r="22" fill="#b8d4e0" opacity="0.6"/><circle cx="85" cy="65" r="22" fill="#98c4d0" opacity="0.7"/><circle cx="75" cy="50" r="20" fill="#a8d4e0" opacity="0.8"/></svg>
                            <svg class="leaves" viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg"><ellipse cx="30" cy="40" rx="12" ry="30" fill="#9fb3cc" opacity="0.5" transform="rotate(-30 30 40)"/><ellipse cx="50" cy="60" rx="10" ry="28" fill="#a8c4d0" opacity="0.5" transform="rotate(20 50 60)"/><ellipse cx="20" cy="100" rx="11" ry="32" fill="#8fa3c4" opacity="0.4" transform="rotate(-40 20 100)"/></svg>
                        </div>
                        <div class="flower-group right">
                            <svg class="flower-large" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="45" fill="#d4a5a5" opacity="0.6"/><circle cx="85" cy="85" r="30" fill="#e8b8b8" opacity="0.7"/><circle cx="115" cy="85" r="30" fill="#d4a5a5" opacity="0.8"/><circle cx="100" cy="60" r="25" fill="#e8c8c8" opacity="0.7"/><circle cx="100" cy="130" r="28" fill="#d9a5a5" opacity="0.6"/></svg>
                            <svg class="flower-small" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg"><circle cx="75" cy="75" r="35" fill="#a8d4e0" opacity="0.5"/><circle cx="65" cy="65" r="22" fill="#b8d4e0" opacity="0.6"/><circle cx="85" cy="65" r="22" fill="#98c4d0" opacity="0.7"/><circle cx="75" cy="50" r="20" fill="#a8d4e0" opacity="0.8"/></svg>
                            <svg class="leaves" viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg"><ellipse cx="70" cy="40" rx="12" ry="30" fill="#9fb3cc" opacity="0.5" transform="rotate(30 70 40)"/><ellipse cx="50" cy="60" rx="10" ry="28" fill="#a8c4d0" opacity="0.5" transform="rotate(-20 50 60)"/><ellipse cx="80" cy="100" rx="11" ry="32" fill="#8fa3c4" opacity="0.4" transform="rotate(40 80 100)"/></svg>
                        </div>
                    </div>
                    <div class="decorative-corner bottom-left"></div>
                    <div class="decorative-corner bottom-right"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="invitation-script.js"></script>
</body>
</html>
